<ion-content class="github-login-bg">
  <div class="login-wrapper">
    
    <div class="logo-container">
      <ion-icon name="logo-github" class="github-logo"></ion-icon>
      <h1>Iniciar sesión</h1>
    </div>

    <div class="login-card">
      <form>
        <div class="input-group">
          <label for="usuario">Usuario o correo electrónico</label>
          <ion-input 
            id="usuario" 
            type="text" 
            [(ngModel)]="txt_usu" 
            name="usuario"
            class="github-input">
          </ion-input>
        </div>

        <div class="input-group">
          <div class="password-header">
            <label for="clave">Contraseña</label>
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
          </div>
          <ion-input 
            id="clave" 
            type="password" 
            [(ngModel)]="txt_cla" 
            name="clave"
            class="github-input">
          </ion-input>
        </div>

        <ion-button expand="block" class="github-btn" (click)="login()">
          Iniciar sesión
        </ion-button>
      </form>
    </div>

    <div class="create-account-box">
      ¿Nuevo en la app? <a routerLink="/registro">Crea una cuenta</a>.
    </div>

  </div>
</ion-content>
