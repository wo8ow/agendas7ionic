<ion-content class="github-light-bg">
  <div class="login-wrapper">
    
    <div class="logo-container">
      <h1 class="welcome-title">¡Bienvenido!</h1>
      <p class="login-subtitle">Inicia sesión en tu cuenta</p>
    </div>

    <div class="login-card">
      <form>
        <div class="input-group">
          <label for="usuario">Usuario o correo electrónico</label>
          <ion-input 
            id="usuario" 
            type="text" 
            [(ngModel)]="txt_usu" 
            name="usuario"
            class="github-input">
          </ion-input>
        </div>

        <div class="input-group">
          <div class="password-header">
            <label for="clave">Contraseña</label>
            <a routerLink="/recuperar" class="forgot-link" style="cursor: pointer;">¿Olvidaste tu contraseña?</a>
          </div>
          <ion-input 
            id="clave" 
            type="password" 
            [(ngModel)]="txt_cla" 
            name="clave"
            class="github-input">
          </ion-input>
        </div>

        <ion-button expand="block" class="github-btn" id="open-loading" (click)="login()">
          Iniciar sesión
        </ion-button>
      </form>
      <ion-loading trigger="open-loading" message="Verificando" duration="3000"></ion-loading>
    </div>

    <div class="create-account-box">
      ¿Nuevo en la app? <a routerLink="/registro" style="cursor: pointer;">Crea una cuenta</a>.
    </div>

  </div>
</ion-content>
