<ion-header>
  <ion-toolbar color="warning">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/contacto"></ion-back-button>
    </ion-buttons>
    <ion-title>Editar Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Nombre</ion-label>
        <ion-input type="text" [(ngModel)]="txt_nombre"></ion-input>
      </ion-item>
      
      <ion-item>
        <ion-label position="floating">Apellido</ion-label>
        <ion-input type="text" [(ngModel)]="txt_apellido"></ion-input>
      </ion-item>
      
      <ion-item>
        <ion-label position="floating">Teléfono</ion-label>
        <ion-input type="tel" [(ngModel)]="txt_telefono"></ion-input>
      </ion-item>

      <ion-button expand="block" color="warning" class="ion-margin-top" (click)="actualizar()">
        Actualizar Datos
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
